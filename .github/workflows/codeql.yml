name: CodeQL

on:
  push:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp

    - name: Build
      run: dotnet build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3